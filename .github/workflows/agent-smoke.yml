name: Agent Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  actions: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run agent:smoke
