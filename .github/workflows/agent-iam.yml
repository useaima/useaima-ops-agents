name: Agent IAM

on:
  schedule:
    - cron: "45 3 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run agent:run -- --agent iam
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTONOMY_MODE: ${{ vars.AUTONOMY_MODE }}
          AGENT_KILL_SWITCH: ${{ vars.AGENT_KILL_SWITCH }}
          ALERT_REPO: ${{ vars.ALERT_REPO }}
          ALERT_REPO_OWNER: ${{ vars.ALERT_REPO_OWNER }}
